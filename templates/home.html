<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StudentDataExcel</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body{
            background:#f8f9fa;
        }

        /* Navbar */
        .custom-navbar{
            background: linear-gradient(90deg,#0d6efd,#0d6efd);
            box-shadow:0 8px 20px rgba(0,0,0,.15);
        }

        .navbar-brand{
            color:#fff !important;
            font-size:1.6rem;
            font-weight:700;
            letter-spacing:.5px;
        }

        .navbar-brand span{
            color:#ffd43b;
        }

        .nav-link{
            color:white !important;
            font-weight:500;
            margin-left:10px;
            position:relative;
            transition:.3s;
        }

        .nav-link::after{
            content:'';
            position:absolute;
            left:0;
            bottom:0;
            width:0%;
            height:2px;
            background:#ffd43b;
            transition:.3s;
        }

        .nav-link:hover::after{
            width:100%;
        }

        .nav-link:hover{
            color:#ffd43b !important;
        }

        .btn-login{
            border:2px solid white;
            color:white;
            border-radius:30px;
            padding:7px 22px;
            transition:.3s;
        }

        .btn-login:hover{
            background:white;
            color:#0d6efd;
        }

        .btn-register{
            background:#ffd43b;
            color:#000;
            border-radius:30px;
            padding:7px 22px;
            font-weight:600;
            transition:.3s;
        }

        .btn-register:hover{
            background:white;
            transform:translateY(-2px);
        }

        .navbar-toggler{
            border:none;
        }

        .navbar-toggler:focus{
            box-shadow:none;
        }

    </style>

</head>
<body>

<nav class="navbar navbar-expand-lg custom-navbar sticky-top">
    <div class="container">

        <a class="navbar-brand" href="#">
            🎓 <span>Student</span>DataExcel
        </a>

        <button class="navbar-toggler bg-light"
                type="button"
                data-bs-toggle="collapse"
                data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navbarNav">

            <ul class="navbar-nav ms-auto align-items-lg-center">

                <li class="nav-item me-lg-3">
                    <a class="nav-link" href="#">Home</a>
                </li>

                <li class="nav-item me-lg-3">
                    <a class="nav-link" href="#">Features</a>
                </li>

                <li class="nav-item me-lg-3">
                    <a class="nav-link" href="#">About</a>
                </li>

                <li class="nav-item me-lg-3 mt-3 mt-lg-0">
                    <a href="{% url 'login' %}" class="btn btn-login">
                        Login
                    </a>
                </li>

                <li class="nav-item mt-3 mt-lg-0">
                    <a href="{% url 'register' %}" class="btn btn-register">
                        Register
                    </a>
                </li>

            </ul>

        </div>

    </div>
</nav>

<!-- Demo Content -->
<div class="container py-5">

    <div class="text-center mt-5">
        <h1 class="display-4 fw-bold">
            Welcome to StudentDataExcel
        </h1>

        <p class="lead text-muted">
            Upload, Validate and Manage Student Excel Records Efficiently.
        </p>

        <a href="{% url 'login' %}" class="btn btn-primary btn-lg px-4 mt-3">
            Get Started
        </a>
    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
    <title>Page Not Found</title>
</head>
<body>
    <h1>404 - Page Not Found</h1>
    <p>The page you requested does not exist.</p>
    {% if not user.is_authenticated %}
        <a href="{% url 'login' %}">Go to Home</a>
    {% else %}
        <a href="{% url 'dashboard' %}">Go Back</a>
    {% endif  %}
</body>
</html>

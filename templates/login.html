{% extends 'base.html' %}

{% block title %}
Login
{% endblock %}

{% block content %}

<div class="container-fluid bg-light vh-100 d-flex justify-content-center align-items-center">

    <div class="card shadow-lg border-0 rounded-4" style="width: 400px;">

        <div class="card-header bg-primary text-white text-center py-3 rounded-top-4">
            <h3 class="mb-0">Login</h3>
        </div>

        <div class="card-body p-4">

            <form method="POST">
                {% csrf_token %}
                <input type="hidden" name="next" value="{{ request.GET.next }}">
                <div class="mb-3">
                    <label class="form-label fw-bold">Email<span class="text-danger">*</span></label>
                    <input
                        type="text"
                        class="form-control"
                        name="login"
                        placeholder="Username or Email"
                        required>
                </div>

                <div class="mb-4">
                    <label class="form-label fw-bold">Password<span class="text-danger">*</span></label>
                    <input
                        type="password"
                        class="form-control"
                        name="password"
                        placeholder="Enter your password"
                        required>
                </div>

                <div class="d-flex justify-content-between mb-3">
                    <div class="form-check">
                        <input
                            class="form-check-input"
                            type="checkbox"
                            id="remember">
                        <label class="form-check-label" for="remember">
                            Remember Me
                        </label>
                    </div>

                    <a href="{% url 'password_reset' %}" class="text-decoration-none">
                        Forgot Password?
                    </a>
                </div>

                <button type="submit" class="btn btn-primary w-100">
                    Login
                </button>

            </form>

        </div>

        <div class="card-footer text-center bg-white">
            Don't have an account?
            <a href="{% url 'register' %}" class="text-decoration-none">
                Register
            </a>
        </div>

    </div>
</div>

{% endblock %}
